{% set version = "2.0.15" %}
{% set name = "pywinpty" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 312cf39153a8736c617d45ce8b6ad6cd2107de121df91c455b10ce6bba7a39b2
  patches:
    # Fix tests to handle ANSI escape codes and line breaks that split paths.
    # Terminal line-wrap inserts \x1b[0K (clear to EOL) and \r\n mid-path when width < path length. Stripping these before comparison fixes the match.
    - 0002-fix-test-ansi-linebreak.patch

build:
  number: 1
  skip: true  # [(not win) or py<39]
  script_env:
    # For py314 support.
    - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
  script: 
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - cargo-bundle-licenses --format yaml --output "{{ SRC_DIR }}\THIRDPARTY.yml"

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.1,<2.0
    # WinPTY backend library (not ConPTY - ConPTY is built into Windows)
    - winpty 0.4.3
  run:
    - python
    # Required for WinPTY backend fallback
    - {{ pin_compatible('winpty') }}

test:
  imports:
    - winpty
  source_files:
    - winpty/tests
    - runtests.py
  requires:
    - pip
    - pytest
    - pytest-timeout
    - flaky
  commands:
    - pip check
    - set CI_RUNNING=1 && python runtests.py --timeout=60  # [win] Tests detect CI and manage CONPTY_CI per backend (ConPTY vs WinPTY)


about:
  home: https://github.com/spyder-ide/pywinpty
  license: MIT
  license_file: 
    - LICENSE.txt
    - THIRDPARTY.yml
  license_family: MIT
  summary: Pseudoterminals for Windows in Python
  description: |
    PyWinpty allows creating and communicating with Windows processes that
    receive input and print outputs via console input and output pipes.
    PyWinpty supports both the native ConPTY interface and the previous,
    fallback winpty library.
  doc_url: https://github.com/spyder-ide/pywinpty
  dev_url: https://github.com/spyder-ide/pywinpty

extra:
  recipe-maintainers:
    - blink1073
    - ccordoba12
    - andfoy
    - ocefpaf
