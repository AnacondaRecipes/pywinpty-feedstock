{% set version = "3.0.2" %}
{% set name = "pywinpty" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 1505cc4cb248af42cb6285a65c9c2086ee9e7e574078ee60933d5d7fa86fb004

build:
  number: 0
  skip: true  # [(not win) or py<39]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-build-isolation
    # debug
    - python -c "import pywinpty; print('pywinpty location:', pywinpty.__file__)"
    - python -c "import pywinpty; import os; print('pywinpty dir contents:'); [print(f) for f in os.listdir(os.path.dirname(pywinpty.__file__))]"
    - echo "Checking build env site-packages:"
    - dir "{{ SP_DIR }}" | findstr pywinpty
    - echo "Checking conda prefix before copy:"
    - dir "{{ PREFIX }}\Lib\site-packages" | findstr pywinpty || echo "No pywinpty found in prefix yet"
    # copy files to conda prefix
    - python -c "import pywinpty, shutil, os; src=os.path.dirname(pywinpty.__file__); dest=os.path.join('{{ PREFIX }}', 'Lib', 'site-packages', 'pywinpty'); print(f'Copying from {src} to {dest}'); shutil.copytree(src, dest, dirs_exist_ok=True)"
    - echo "Checking conda prefix after copy:"
    - dir "{{ PREFIX }}\Lib\site-packages" | findstr pywinpty
    - python -c "import os; print('All files in prefix site-packages:'); [print(f) for f in os.listdir('{{ PREFIX }}\\Lib\\site-packages') if 'pywinpty' in f.lower()]"
    - cargo-bundle-licenses --format yaml --output "{{ SRC_DIR }}\THIRDPARTY.yml"
    
requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.1,<2.0
    - winpty 0.4.3
  run:
    - python
    - {{ pin_compatible('winpty') }}

test:
  imports:
    #- winpty
  requires:
    - pip
  commands:
    #- pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

about:
  home: https://github.com/andfoy/pywinpty
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  license_family: MIT
  summary: Pseudoterminals for Windows in Python
  description: |
    PyWinpty allows creating and communicating with Windows processes that
    receive input and print outputs via console input and output pipes.
    PyWinpty supports both the native ConPTY interface and the previous,
    fallback winpty library.
  doc_url: https://github.com/andfoy/pywinpty
  dev_url: https://github.com/andfoy/pywinpty

extra:
  recipe-maintainers:
    - blink1073
    - ccordoba12
    - andfoy
    - ocefpaf
