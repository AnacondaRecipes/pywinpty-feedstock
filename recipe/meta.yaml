{% set version = "3.0.2" %}
{% set name = "pywinpty" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 1505cc4cb248af42cb6285a65c9c2086ee9e7e574078ee60933d5d7fa86fb004

build:
  number: 0
  skip: true  # [(not win) or py<39]
  script:
    # Add verbose output to see what Maturin is doing
    - echo "Starting Maturin build..."
    - maturin build --release --interpreter {{ PYTHON }} --verbose
    - echo "Maturin build completed, checking results:"
    - dir target /s | findstr wheels
    - echo "Checking if any wheels were created anywhere:"
    - dir *.whl /s || echo "No .whl files found anywhere"
    # Try a different Maturin approach
    - echo "Trying maturin develop instead..."
    - maturin develop --release
    - echo "Checking what maturin develop installed:"
    - {{ PYTHON }} -c "import sys; print('Python path:', sys.path)"
    - {{ PYTHON }} -c "try: import pywinpty; print('pywinpty imported successfully from:', pywinpty.__file__); except Exception as e: print('Import failed:', e)"
    # If that worked, copy to prefix
    - {{ PYTHON }} -c "import pywinpty, shutil, os; src=os.path.dirname(pywinpty.__file__); dest=os.path.join(r'{{ PREFIX }}', 'Lib', 'site-packages', 'pywinpty'); print(f'Copying from {src} to {dest}'); shutil.copytree(src, dest, dirs_exist_ok=True)" || echo "Copy failed - pywinpty not found"
    - cargo-bundle-licenses --format yaml --output "{{ SRC_DIR }}\THIRDPARTY.yml"

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.1,<2.0
    - winpty 0.4.3
  run:
    - python
    - {{ pin_compatible('winpty') }}

test:
  imports:
    #- winpty
  requires:
    - pip
  commands:
    #- pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

about:
  home: https://github.com/andfoy/pywinpty
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  license_family: MIT
  summary: Pseudoterminals for Windows in Python
  description: |
    PyWinpty allows creating and communicating with Windows processes that
    receive input and print outputs via console input and output pipes.
    PyWinpty supports both the native ConPTY interface and the previous,
    fallback winpty library.
  doc_url: https://github.com/andfoy/pywinpty
  dev_url: https://github.com/andfoy/pywinpty

extra:
  recipe-maintainers:
    - blink1073
    - ccordoba12
    - andfoy
    - ocefpaf
